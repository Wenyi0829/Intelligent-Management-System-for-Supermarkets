<!DOCTYPE html>
<html>
<head>
<title>商品展示</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script type="application/x-javascript"> addEventListener("load", function() { setTimeout(hideURLbar, 0); }, false); function hideURLbar(){ window.scrollTo(0,1); } </script>
<meta name="keywords" content="" />
<link href="../static/css/style.css" rel='stylesheet' type='text/css' />
<!--webfonts-->
<link href='fonts.useso.com/css?family=PT+Sans:400,700,400italic,700italic|Oswald:400,300,700' rel='stylesheet' type='text/css'>
<link href='fonts.useso.com/css?family=Exo+2' rel='stylesheet' type='text/css'>
<!--//webfonts-->
    <script>
        {% if error %}
            window.onload = function() {
                alert("{{ error }}");
            };
        {% endif %}
                    function goback() {
            window.location.href = "/saler";
        }
    </script>

</head>

{% block content %}
<body>
<script>$(document).ready(function(c) {
	$('.close').on('click', function(c){
		$('.login-form').fadeOut('slow', function(c){
	  		$('.login-form').remove();
		});
	});
});
</script>
 <h1>所有商品</h1>
<div class="show-form">
	<div class="close" onclick="goback();"></div>
		<div class="head-info">
			<label class="lbl-1"> </label>
			<label class="lbl-2"> </label>
			<label class="lbl-3"> </label>
		</div>

    <form action="" method="post">
        <table width="600" border="1" align="center">
            <h4 align="center">展示商品</h4>
            <tr>
                <th align="center">商品编号</th>
                <th align="center">商品名</th>
                <th align="center">商品价格</th>
                <th align="center">打折价格</th>
                <th align="center">是否允许打折</th>
                <th align="center">是否允许销售</th>
            </tr>
            {% for good in goods %}
            <tr>
                <th>{{good[0]}}</th>
                <th>{{good[1]}}</th>
                <th>{{good[2]}}</th>
                <th>{{good[3]}}</th>
                <th>{% if good[4] != 0 %}是{% else %}否{% endif %}</th>
                <th>{% if good[5] != 0 %}是{% else %}否{% endif %}</th>


                <th align="center"><input type="radio" name="radio" value={{ good[0] }}></th>
            </tr>
            {% endfor %}
        </table>

        <br><br>

        <div class=actions align = "center" >
	        <input align="left" type='submit' name="add" value="添加" >
            <input align="center" type="submit" name="modify" value="查询/修改详细信息">
            <input align="right" type="submit" name="delete" value="删除">
	    </div>
    </form>


    </div>

</body>
{% endblock %}

</html>
