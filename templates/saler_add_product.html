<!DOCTYPE html>
<html>
	<head>
		<title>添加商品</title>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<script type="application/x-javascript">
			addEventListener("load", function() { setTimeout(hideURLbar, 0); }, false); function hideURLbar(){ window.scrollTo(0,1); }
		</script>
		<meta name="keywords" content="" />
		<link href="../static/css/style.css" rel='stylesheet' type='text/css' />
		<!--webfonts-->
		<link href='fonts.useso.com/css?family=PT+Sans:400,700,400italic,700italic|Oswald:400,300,700' rel='stylesheet' type='text/css'>
		<link href='fonts.useso.com/css?family=Exo+2' rel='stylesheet' type='text/css'>
		<!--//webfonts-->
		<script>
			{% if error %}
            window.onload = function() {
                alert("{{ error }}");
            };
            {% endif %}
        </script>
		<style>
            .login-form {
                background: #2b2b36;
                text-align: center;
                border-radius: 15px;
                -webkit-border-radius: 15px;
                -moz-border-radius: 15px;
                margin-top: 20px;
                width: 35em;
            }
            h1 {
                margin-top: 10px; /* 设置标题的上边距 */
                margin-bottom: 10px; /* 设置标题的下边距 */
                padding-top: 20px;
            }
			.radio-group {
              display: flex;
              align-items: center;
              justify-content: center;
              color: #757575;
            }

            .radio {
              margin: 20px 5px;
            }

            label {
              font-family: Arial, sans-serif;
              font-size: 18px;
              margin-right: 15px;
            }
        </style>
    </head>

	{% block content %}
	<body>
		<script>$(document).ready(function(c) {
	        $('.close').on('click', function(c){
		    $('.login-form').fadeOut('slow', function(c){
	  		    $('.login-form').remove();
		    });
	    });
    });
                function goback() {
            window.location.href = "/saler/show_product";
        }
</script>

		<!--SIGN UP-->
		<h1>添加商品</h1>
		<div class="login-form">
			<div class="close" onclick="goback();"></div>
			<div class="head-info">
				<label class="lbl-1"> </label>
				<label class="lbl-2"> </label>
				<label class="lbl-3"> </label>
			</div>
			<div class="clear"> </div>
			<form action="" method=post>
				<input type="text" class="text" name="product_id" placeholder="商品编号（必填）">
				<input type="text" class="text" name="product_name" placeholder="商品名称（必填）">
				<input type="text" class="text" name="price" placeholder="商品定价（必填）">
				<input type="text" class="text" name="supplier_id" placeholder="供货商编号（必填）">
				<div class="radio-group">
					<input type="radio" class="radio" name="allow_discount" value="1" id="allow_discount" checked>
					<label for="allow_discount">允许打折</label>

					<input type="radio" class="radio" name="allow_discount" value="0" id="not_allow_discount" >
					<label for="not_allow_discount">不允许打折</label>
				</div>
				<input type="text" class="text" name="promotion_price" placeholder="促销价格">
				<input type="text" class="text" name="promotion_start_date" placeholder="促销起日期">
				<input type="text" class="text" name="promotion_end_date" placeholder="促销止日期">

				<div class="radio-group">
					<input type="radio" class="radio" name="allow_sales" value="1" id="allow_sales" checked>
					<label for="allow_sales">允许销售</label>
					<input type="radio" class="radio" name="allow_sales" value="0" id="not_allow_sales" >
					<label for="not_allow_sales">不允许销售</label>
				</div>


				<div class=actions>
					<input type="submit" value="确定">
				</div>
			</form>


			{% with messages = get_flashed_messages() %}
			{% if messages %}
			<ul class=flashes>
				{% for message in messages %}
				<li>{{ message }}</li>
				{% endfor %}
			</ul>
			{% endif %}
			{% endwith %}


		</div>
	</body>
	{% endblock %}
</html>
